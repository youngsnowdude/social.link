<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Young man | Соцсети</title>
    <!-- Метатеги для красивого превью в мессенджерах -->
    <meta name="description" content="Все мои соцсети в одном месте: Telegram, Twitch, Instagram, TikTok, YouTube, Discord, VK">
    <meta property="og:title" content="Young man">
    <meta property="og:description" content="Мои соцсети — подписывайся">
    <meta property="og:type" content="website">
    <!-- Font Awesome 6 (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ОСНОВНОЙ ФОН: Твоя картинка вместо градиента */
        body {
            min-height: 100vh;
            /* ЗАМЕНИ 'background.jpg' на свою фотку */
                background-image: url('https://pin.it/3JPKfYGNT');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Затемняющий слой поверх фона, чтобы текст читался */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65); /* регулируй прозрачность */
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 550px;
            width: 100%;
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 56px;
            padding: 40px 28px 50px;
            text-align: center;
            border: 1px solid rgba(72, 120, 184, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* АВАТАРКА — круглое фото */
        .avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            background: #2c3e50;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Главное имя */
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #eef2ff, #b9d0f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Никнейм */
        .nickname {
            font-size: 1rem;
            font-weight: 400;
            color: #8aa9d6;
            background: rgba(0, 0, 0, 0.45);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            margin-bottom: 40px;
            letter-spacing: 0.3px;
            border: 0.5px solid #2c4c7c;
        }

        /* Сетка для кнопок */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        /* Общий стиль кнопок */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: rgba(10, 20, 35, 0.8);
            backdrop-filter: blur(4px);
            padding: 16px 20px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            transition: 0.2s all;
            border: 1px solid rgba(70, 130, 200, 0.4);
            color: #eef5ff;
        }

        .social-btn i {
            font-size: 1.7rem;
            width: 32px;
            text-align: center;
            transition: transform 0.2s;
        }

        .social-btn span {
            flex: 1;
            text-align: left;
            font-weight: 500;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            background: rgba(20, 40, 65, 0.95);
            border-color: #5d9eff;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        .social-btn:hover i {
            transform: scale(1.05);
        }

        /* Цветные акценты при ховере */
        .social-btn.telegram:hover i { color: #26A5E4; text-shadow: 0 0 5px #26A5E4; }
        .social-btn.twitch:hover i { color: #9146FF; text-shadow: 0 0 5px #9146FF; }
        .social-btn.instagram:hover i { color: #E4405F; text-shadow: 0 0 5px #E4405F; }
        .social-btn.tiktok:hover i { color: #69C9D0; text-shadow: 0 0 5px #69C9D0; }
        .social-btn.youtube:hover i { color: #FF0000; text-shadow: 0 0 5px #FF0000; }
        .social-btn.discord:hover i { color: #5865F2; text-shadow: 0 0 5px #5865F2; }
        .social-btn.vk:hover i { color: #4680C2; text-shadow: 0 0 5px #4680C2; }

        /* Специальная кнопка для скачивания файла */
        .download-btn {
            background: rgba(30, 50, 70, 0.9);
            border-color: #f5af19;
            margin-top: 10px;
        }
        .download-btn:hover {
            background: rgba(50, 70, 90, 0.95);
            border-color: #ffcc33;
        }
        .download-btn i {
            color: #f5af19;
        }

        /* Подвал */
        .footer-note {
            margin-top: 35px;
            font-size: 0.7rem;
            color: #b0c4de;
            border-top: 1px dashed #2c4870;
            padding-top: 20px;
        }

        /* Мобильная адаптация */
        @media (max-width: 520px) {
            .card {
                padding: 30px 18px 40px;
            }
            .avatar {
                width: 80px;
                height: 80px;
                margin-bottom: 15px;
            }
            h1 {
                font-size: 2rem;
            }
            .nickname {
                font-size: 0.85rem;
                margin-bottom: 30px;
            }
            .social-btn {
                padding: 12px 16px;
                font-size: 1rem;
            }
            .social-btn i {
                font-size: 1.4rem;
                width: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="card">

        <div class="avatar">

        <!-- Блок скачивания файла "Optimization для пк" -->

        <div class="footer-note">

        </div>
    </div>
</body>
</html>
